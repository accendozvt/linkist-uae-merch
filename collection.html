<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Collection — I Never Left T-Shirt | Linkist UAE</title>
<meta name="description" content="Shop all I Never Left T-Shirt designs by Linkist UAE. Circle, Smile, Stripe and Stealth editions. Limited April 2026 drop. UAE flag colors. Ships worldwide.">
<meta property="og:title" content="Full T-Shirt Collection — I Never Left | Linkist UAE"/>
<meta property="og:description" content="All four I Never Left T-Shirt designs. Limited edition April 2026. Ships from UAE."/>
<meta property="og:image" content="/images/og.png"/>
<meta property="og:type" content="website"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="icon" type="image/png" href="/images/fav.png">
<link rel="stylesheet" href="style.css">
<style>
.collection-page { max-width:1200px; margin:0 auto; padding:100px 64px 100px; }
.collection-header { border-bottom:1px solid #1a1a1a; padding-bottom:32px; margin-bottom:48px; display:flex; align-items:flex-end; justify-content:space-between; gap:24px; }
.collection-title { font-family:'Inter',sans-serif; font-size:clamp(24px,3vw,44px); line-height:1; }
.collection-meta { font-family:'Space Mono',monospace; font-size:10px; color:#999; letter-spacing:0.05em; text-align:right; line-height:1.8; }
.collection-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
.loading-wrap { min-height:40vh; display:flex; align-items:center; justify-content:center; color:#888; font-family:'Space Mono',monospace; font-size:13px; }
/* Product cards */
.pcard {
  background:#111; border:1px solid #1e1e1e; border-radius:10px; overflow:hidden;
  display:flex; flex-direction:column; text-decoration:none; color:var(--white);
  transition:transform 0.3s, border-color 0.3s;
}
.pcard:hover { transform:translateY(-5px); border-color:rgba(255,255,255,0.12); }
.pcard-img { position:relative; background:#0d0d0d; aspect-ratio:1/1; overflow:hidden; }
.pcard-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.5s; display:block; }
.pcard:hover .pcard-img img { transform:scale(1.04); }
.pcard-badge {
  position:absolute; top:10px; left:10px; z-index:1;
  background:#E53935; color:#fff; font-family:'Space Mono',monospace;
  font-size:9px; padding:3px 8px; border-radius:3px; text-transform:uppercase; letter-spacing:0.1em;
}
.pcard-info { padding:16px; display:flex; flex-direction:column; gap:10px; flex:1; }
.pcard-name { font-size:13px; font-weight:600; letter-spacing:0.02em; }
.pcard-tag  { font-family:'Space Mono',monospace; font-size:9px; color:#888; letter-spacing:0.06em; }
.pcard-price { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; line-height:1.4; color:var(--white); display:flex; flex-wrap:wrap; align-items:baseline; gap:4px; }
.price-was { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:400; color:#555; text-decoration:line-through; }
.price-sale { font-size:16px; font-weight:700; color:var(--white) !important; }
.pcard-img-dots { position:absolute; bottom:8px; left:0; right:0; display:flex; justify-content:center; gap:5px; z-index:2; }
.pcard-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.35); cursor:pointer; transition:background 0.2s; display:inline-block; }
.pcard-dot.active { background:#fff; }
.notify-btn {
  display:block; width:calc(100% - 32px); margin:0 16px 14px;
  padding:8px; background:transparent; border:1px solid #2a2a2a; border-radius:6px;
  color:#666; font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:0.08em; cursor:pointer; transition:all 0.2s; text-align:center;
}
.notify-btn:hover { border-color:#C8102E; color:#fff; }
.notify-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:500; display:none; align-items:center; justify-content:center; padding:20px; }
.notify-modal-overlay.open { display:flex; }
.notify-modal { background:#111; border:1px solid #2a2a2a; border-radius:14px; padding:32px; max-width:380px; width:100%; text-align:center; position:relative; }
.notify-modal h3 { font-family:'Inter',sans-serif; font-size:28px; margin:0 0 8px; }
.notify-modal p { font-size:13px; color:#888; margin:0 0 20px; line-height:1.6; }
.notify-modal input { width:100%; background:#0a0a0a; border:1px solid #2a2a2a; border-radius:8px; color:#F5F5F5; font-size:14px; padding:12px 14px; outline:none; margin-bottom:12px; font-family:'DM Sans',sans-serif; box-sizing:border-box; }
.notify-modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:#555; font-size:22px; cursor:pointer; }
.pcard-cta {
  display:flex; align-items:center; justify-content:center; gap:6px;
  background:rgba(255,255,255,0.06); border-radius:6px; padding:9px;
  font-size:11px; font-weight:600; letter-spacing:0.04em; text-transform:uppercase;
  transition:background 0.2s;
}
.pcard:hover .pcard-cta { background:rgba(255,255,255,0.12); }
.pcard-soldout { opacity:0.6; pointer-events:auto; }
.pcard-soldout:hover { transform:none; }
.pcard-stock-warn { position:absolute; bottom:8px; left:8px; z-index:1; background:rgba(200,16,46,0.85); color:#fff; font-family:'Space Mono',monospace; font-size:9px; padding:3px 8px; border-radius:3px; letter-spacing:0.08em; }
@media(max-width:960px) { .collection-grid{grid-template-columns:repeat(3,1fr)} .collection-page{padding:80px 40px 80px} }
@media(max-width:640px) { .collection-grid{grid-template-columns:1fr 1fr;gap:10px} .collection-page{padding:80px 20px 60px} .collection-header{flex-direction:column;align-items:flex-start} .collection-meta{text-align:left} }
@media(max-width:400px) { .collection-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<div id="nav-root"></div>

<div class="collection-page">
  <div class="collection-header">
    <h1 class="collection-title">The Full Collection</h1>
    <p class="collection-meta">Premium performance fabric · Black · Unisex fit<br>100% proceeds to UAE relief · April 2026</p>
  </div>
  <div id="collection-grid"><div class="loading-wrap">Loading...</div></div>
</div>

<div id="footer-root"></div>

<div class="notify-modal-overlay" id="notify-modal">
  <div class="notify-modal">
    <button class="notify-modal-close" onclick="closeNotifyModal()">×</button>
    <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notify Me</h3>
    <p id="notify-modal-desc">Enter your email and we'll notify you when it's back.</p>
    <input type="email" id="notify-email" placeholder="your@email.com" autocomplete="email"/>
    <button class="btn-primary" style="width:100%;" onclick="submitNotify()">Notify Me</button>
    <div id="notify-feedback" style="font-size:12px;margin-top:10px;display:none;"></div>
  </div>
</div>

<script src="cart.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav('collection');
document.getElementById('footer-root').innerHTML = renderFooter();

function renderProductCard(p) {
  const image = p.image_url || p.image || '';
  const page = p.page || `product.html?id=${p.id}`;
  const stockVals = p.stock ? Object.values(p.stock) : [];
  const totalStock = stockVals.length ? stockVals.reduce((a, b) => a + b, 0) : null;
  const soldOut = totalStock !== null && totalStock === 0;
  const lowStock = !soldOut && totalStock !== null && totalStock <= 10;
  const extraImgs = Array.isArray(p.images) ? p.images : [];
  const allImgs = [image, ...extraImgs].filter(Boolean);
  const origPrice = p.originalPrice || p.original_price;
  function fmtP(v) { return 'AED ' + parseFloat(v).toFixed(2); }
  const priceHtml = origPrice
    ? `<span class="price-was">${fmtP(origPrice)}</span><span class="price-sale">${fmtP(p.price)}</span>`
    : fmtP(p.price);
  return `
  <div class="pcard${soldOut ? ' pcard-soldout' : ''}" id="cpcard-${p.id}"${allImgs.length > 1 ? ` data-images='${JSON.stringify(allImgs)}'` : ''}>
    <a href="${page}" class="pcard-img-link" style="text-decoration:none;color:inherit;display:block;">
      <div class="pcard-img">
        <img src="${image}" alt="${p.name}" loading="lazy" id="cpcard-img-${p.id}"/>
        ${allImgs.length > 1 ? `<div class="pcard-img-dots" id="cpcard-dots-${p.id}">${allImgs.map((_,i)=>`<span class="pcard-dot${i===0?' active':''}" onclick="event.preventDefault();cpcardSetImg('${p.id}',${i})"></span>`).join('')}</div>` : ''}
        ${soldOut ? '<div class="pcard-badge" style="background:#333;color:#888;">SOLD OUT</div>' : (p.badge ? `<div class="pcard-badge">${p.badge}</div>` : '')}
        ${lowStock ? `<div class="pcard-stock-warn">Only ${totalStock} left</div>` : ''}
      </div>
      <div class="pcard-info">
        <div>
          <div class="pcard-name">${p.name}</div>
          <div class="pcard-tag">${p.tag || ''}</div>
        </div>
        <div class="pcard-price">${priceHtml}</div>
        <div class="pcard-cta">
          ${soldOut ? 'Sold Out' : 'View & Buy'}
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
    </a>
    ${soldOut ? `<button class="notify-btn" onclick="openNotifyModal('${p.id}','${p.name.replace(/'/g,"\\'")}','')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notify me when back</button>` : ''}
  </div>`;
}

function cpcardSetImg(pid, idx) {
  const card = document.getElementById('cpcard-' + pid);
  if (!card) return;
  const imgs = JSON.parse(card.dataset.images || '[]');
  const imgEl = document.getElementById('cpcard-img-' + pid);
  if (imgEl && imgs[idx]) imgEl.src = imgs[idx];
  document.querySelectorAll(`#cpcard-dots-${pid} .pcard-dot`).forEach((d, i) => d.classList.toggle('active', i === idx));
}

function initCardCarousels() {
  document.querySelectorAll('.pcard[data-images]').forEach(card => {
    const imgs = JSON.parse(card.dataset.images);
    if (imgs.length <= 1) return;
    const pid = card.id.replace('cpcard-', '');
    let idx = 0;
    setInterval(() => { idx = (idx + 1) % imgs.length; cpcardSetImg(pid, idx); }, 2500);
    card.addEventListener('mouseleave', () => { idx = 0; cpcardSetImg(pid, 0); });
  });
}

fetch('/products')
  .then(r => r.json())
  .then(products => {
    const list = products.length ? products : PRODUCTS;
    const grid = document.getElementById('collection-grid');
    grid.className = 'collection-grid';
    grid.innerHTML = list.map(renderProductCard).join('');
    initCardCarousels();
  })
  .catch(() => {
    const grid = document.getElementById('collection-grid');
    grid.className = 'collection-grid';
    grid.innerHTML = PRODUCTS.map(renderProductCard).join('');
    initCardCarousels();
  });

let _notifyPid = '', _notifySize = '';
function openNotifyModal(pid, pname, size) {
  _notifyPid = pid; _notifySize = size;
  document.getElementById('notify-modal-desc').innerHTML = size
    ? `We'll email you when <strong>${pname}</strong> in size <strong>${size}</strong> is back.`
    : `We'll email you when <strong>${pname}</strong> is back in stock.`;
  document.getElementById('notify-email').value = '';
  document.getElementById('notify-feedback').style.display = 'none';
  document.getElementById('notify-modal').classList.add('open');
}
function closeNotifyModal() { document.getElementById('notify-modal').classList.remove('open'); }
async function submitNotify() {
  const email = document.getElementById('notify-email').value.trim();
  if (!email) return;
  const fb = document.getElementById('notify-feedback');
  try {
    const res = await fetch('/notify-me', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, product_id: _notifyPid, size: _notifySize }) });
    const data = await res.json();
    if (res.ok) { fb.textContent = "You're on the list!"; fb.style.color = '#007A3D'; fb.style.display = 'block'; setTimeout(closeNotifyModal, 2000); }
    else { fb.textContent = data.error || 'Error'; fb.style.color = '#E53935'; fb.style.display = 'block'; }
  } catch { fb.textContent = 'Could not connect.'; fb.style.color = '#E53935'; fb.style.display = 'block'; }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('notify-modal')?.addEventListener('click', e => { if (e.target === document.getElementById('notify-modal')) closeNotifyModal(); });
});
</script>
</body>
</html>
