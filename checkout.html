<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — I Never Left T-Shirt | Linkist UAE</title>
<meta name="description" content="Secure checkout for the I Never Left T-Shirt by Linkist UAE. Limited edition April 2026 drop.">
<link rel="icon" type="image/png" href="/images/fav.png">
<link rel="stylesheet" href="style.css">
<style>
.co-wrap { max-width: 960px; margin: 0 auto; padding: 96px 40px 80px; }

/* Steps indicator */
.co-steps {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 36px; max-width: 360px;
}
.co-step {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Space Mono', monospace; font-size: 10px;
  letter-spacing: 1px; text-transform: uppercase; color: #444;
}
.co-step.active { color: var(--white); }
.co-step.done { color: #007A3D; }
.co-step-num {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid #333; display: flex; align-items: center;
  justify-content: center; font-size: 10px; font-weight: 700;
  flex-shrink: 0;
}
.co-step.active .co-step-num { background: var(--white); color: var(--black); border-color: var(--white); }
.co-step.done .co-step-num { background: #007A3D; border-color: #007A3D; color: #fff; }
.co-step-line { flex: 1; height: 1px; background: #222; margin: 0 12px; min-width: 32px; }

/* Layout */
.co-layout { display: grid; grid-template-columns: 1fr 340px; gap: 32px; align-items: start; }

/* Form card */
.co-card { background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 28px; margin-bottom: 0; }
.co-section-title {
  font-family: 'Space Mono', monospace; font-size: 10px; color: #555;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 18px;
}
.co-section-title + .co-section-title { margin-top: 24px; }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-family: 'Space Mono', monospace; font-size: 9px;
  letter-spacing: 2px; color: #555; text-transform: uppercase; margin-bottom: 6px;
}
.field input, .field select {
  width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px;
  color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px;
  padding: 11px 13px; outline: none; transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.field input:focus, .field select:focus { border-color: #555; }
.field input.err, .field select.err { border-color: var(--accent); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.co-save-row {
  display: flex; align-items: center; gap: 10px; margin: 18px 0 4px;
  font-family: 'Space Mono', monospace; font-size: 10px; color: #555;
  letter-spacing: 1px; cursor: pointer; user-select: none;
}
.co-save-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--green); cursor:pointer; flex-shrink:0; margin:0; }
.co-error {
  background: rgba(229,57,53,0.1); border: 1px solid rgba(229,57,53,0.3);
  border-radius: 8px; color: #E53935; font-size: 13px;
  padding: 11px 14px; margin-bottom: 14px; display: none;
}

/* Order summary sidebar */
.co-summary { background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 24px; position: sticky; top: 84px; }
.co-sum-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 22px; margin-bottom: 16px; }
.co-sum-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.co-sum-item { display: grid; grid-template-columns: 48px 1fr auto; gap: 10px; align-items: center; }
.co-sum-img { width: 48px; height: 48px; border-radius: 6px; background: #0d0d0d; overflow: hidden; }
.co-sum-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.co-sum-name { font-size: 12px; font-weight: 600; }
.co-sum-meta { font-family: 'Space Mono', monospace; font-size: 9px; color: #555; margin-top: 2px; }
.co-sum-price { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 18px; white-space: nowrap; }
.co-sum-divider { border: none; border-top: 1px solid #1e1e1e; margin: 12px 0; }
.co-sum-total { display: flex; justify-content: space-between; align-items: baseline; }
.co-sum-total-label { font-size: 12px; color: #666; }
.co-sum-total-val { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 26px; }

/* Auth gate */
.co-auth {
  background: #111; border: 1px solid #1e1e1e; border-radius: 14px; padding: 40px 32px;
}
.co-auth-icon {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(200,16,46,0.1); border: 1px solid rgba(200,16,46,0.25);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
}
.co-auth-heading { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 30px; text-align: center; margin-bottom: 8px; }
.co-auth-sub { font-size: 13px; color: #888; line-height: 1.6; text-align: center; margin-bottom: 28px; }
.co-auth-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.co-auth-card { background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 10px; padding: 20px 16px; transition: border-color 0.2s; }
.co-auth-card:hover { border-color: #333; }
.co-auth-label { font-family: 'Space Mono', monospace; font-size: 9px; color: #444; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.co-auth-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.co-auth-desc { font-size: 12px; color: #666; line-height: 1.5; margin-bottom: 14px; }

/* Step 2 review */
.co-review-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
.co-review-row:last-child { border-bottom: none; }
.co-review-label { font-family: 'Space Mono', monospace; font-size: 9px; color: #555; letter-spacing: 1px; text-transform: uppercase; }
.co-review-val { font-size: 13px; color: #ccc; text-align: right; max-width: 60%; }
.co-back-link { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; cursor: pointer; background: none; border: none; letter-spacing: 1px; padding: 0; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
.co-back-link:hover { color: #888; }

@media(max-width: 760px) {
  .co-wrap { padding: 84px 16px 60px; }
  .co-layout { grid-template-columns: 1fr; gap: 20px; }
  .co-summary { position: relative; top: 0; }
  .field-row { grid-template-columns: 1fr; }
  .co-auth-cards { grid-template-columns: 1fr; }
  .co-steps { max-width: 100%; }
}
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="co-wrap">
  <div id="co-steps-root"></div>
  <div id="co-body"></div>
</div>
<div id="footer-root"></div>

<script src="cart.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav();
document.getElementById('footer-root').innerHTML = renderFooter();

const cartItems = Cart.get();
if (!cartItems.length) window.location.href = 'cart.html';

const customer = getCustomer();

const EMIRATES = ['Abu Dhabi','Dubai','Sharjah','Ajman','Umm Al Quwain','Ras Al Khaimah','Fujairah'];

// State
let currentStep = 1; // 1 = address, 2 = review+pay
let formData = {};

// ── Helpers ──────────────────────────────────────────────────
function escHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

function summaryHTML() {
  const total = Cart.total();
  return `
    <div class="co-summary">
      <div class="co-sum-title">Your Order</div>
      <div class="co-sum-items">
        ${cartItems.map(item => `
          <div class="co-sum-item">
            <div class="co-sum-img"><img src="${escHtml(item.image)}" alt="${escHtml(item.name)}"/></div>
            <div>
              <div class="co-sum-name">${escHtml(item.name)}</div>
              <div class="co-sum-meta">SIZE: ${item.size} · ×${item.qty}</div>
            </div>
            <div class="co-sum-price">AED ${(item.price * item.qty).toFixed(2)}</div>
          </div>`).join('')}
      </div>
      <hr class="co-sum-divider"/>
      <div class="co-sum-total">
        <span class="co-sum-total-label">Total</span>
        <span class="co-sum-total-val">AED ${parseFloat(total).toFixed(2)}</span>
      </div>
    </div>`;
}

function stepsHTML(active) {
  const s = (n) => active > n ? 'done' : active === n ? 'active' : '';
  return `<div class="co-steps">
    <div class="co-step ${s(1)}">
      <div class="co-step-num">${active > 1 ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '1'}</div>
      <span>Delivery</span>
    </div>
    <div class="co-step-line"></div>
    <div class="co-step ${s(2)}">
      <div class="co-step-num">2</div>
      <span>Payment</span>
    </div>
  </div>`;
}

// ── AUTH GATE (guest) ─────────────────────────────────────────
function renderAuthGate() {
  document.getElementById('co-steps-root').innerHTML = '';
  document.getElementById('co-body').innerHTML = `
    <div class="co-layout">
      <div>
        <div class="co-auth">
          <div class="co-auth-icon">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#C8102E" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <h2 class="co-auth-heading">Sign in to continue</h2>
          <p class="co-auth-sub">Create an account or log in to complete your purchase.<br>Your order and shipping details will be saved.</p>
          <div class="co-auth-cards">
            <div class="co-auth-card">
              <div class="co-auth-label">New here?</div>
              <div class="co-auth-title">Create Account</div>
              <div class="co-auth-desc">Takes 30 seconds. Track your order and save your address for next time.</div>
              <a href="account-login.html?tab=register&redirect=checkout.html" class="btn-primary" style="width:100%;justify-content:center;font-size:13px;padding:11px 16px;">Create Account →</a>
            </div>
            <div class="co-auth-card">
              <div class="co-auth-label">Have an account?</div>
              <div class="co-auth-title">Sign In</div>
              <div class="co-auth-desc">Log in to pre-fill your details and complete checkout faster.</div>
              <a href="account-login.html?redirect=checkout.html" class="btn-secondary" style="width:100%;justify-content:center;font-size:13px;padding:11px 16px;">Sign In →</a>
            </div>
          </div>
        </div>
      </div>
      ${summaryHTML()}
    </div>`;
}

// ── STEP 1: Delivery Details ──────────────────────────────────
function renderStep1() {
  currentStep = 1;
  document.getElementById('co-steps-root').innerHTML = stepsHTML(1);
  const emiratesOpts = EMIRATES.map(e => `<option value="${e}"${formData.state===e?' selected':''}>${e}</option>`).join('');
  document.getElementById('co-body').innerHTML = `
    <div class="co-layout">
      <div>
        <div class="co-card">
          <div class="co-error" id="co-error"></div>
          <div class="co-section-title">Contact Details</div>
          <div class="field-row">
            <div class="field">
              <label>Full Name *</label>
              <input type="text" id="co-name" value="${escHtml(formData.name||'')}" placeholder="Your full name" autocomplete="name"/>
            </div>
            <div class="field">
              <label>Phone *</label>
              <input type="tel" id="co-phone" value="${escHtml(formData.phone||'')}" placeholder="+971 50 000 0000" autocomplete="tel"/>
            </div>
          </div>
          <div class="field">
            <label>Email Address *</label>
            <input type="email" id="co-email" value="${escHtml(formData.email||'')}" placeholder="you@example.com" autocomplete="email"/>
          </div>

          <div class="co-section-title" style="margin-top:24px;">Shipping Address</div>
          <div class="field">
            <label>Address Line 1 *</label>
            <input type="text" id="co-line1" value="${escHtml(formData.line1||'')}" placeholder="Building, street, area" autocomplete="address-line1"/>
          </div>
          <div class="field">
            <label>Address Line 2</label>
            <input type="text" id="co-line2" value="${escHtml(formData.line2||'')}" placeholder="Apartment, floor, unit (optional)" autocomplete="address-line2"/>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Emirate *</label>
              <select id="co-state">
                <option value="">Select Emirate</option>
                ${emiratesOpts}
                <option value="Other"${formData.state==='Other'?' selected':''}>Other</option>
              </select>
            </div>
            <div class="field">
              <label>City / Area</label>
              <input type="text" id="co-city" value="${escHtml(formData.city||'')}" placeholder="e.g. Downtown" autocomplete="address-level2"/>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>Postal Code</label>
              <input type="text" id="co-postal" value="${escHtml(formData.postal||'')}" placeholder="Optional" autocomplete="postal-code"/>
            </div>
            <div class="field">
              <label>Country</label>
              <input type="text" id="co-country" value="United Arab Emirates" disabled style="background:#0d0d0d;color:#888;cursor:not-allowed;"/>
              <div style="font-family:'Space Mono',monospace;font-size:9px;color:#555;letter-spacing:1px;margin-top:6px;">Delivery is currently UAE-only</div>
            </div>
          </div>
          <label class="co-save-row">
            <input type="checkbox" id="co-save" ${formData.saveAddress!==false?'checked':''}/> Save address to my account
          </label>

          <!-- Billing address toggle -->
          <div class="co-section-title" style="margin-top:24px;">Billing Address</div>
          <label class="co-save-row" style="margin-top:0;">
            <input type="checkbox" id="co-bill-same" ${formData.billingDifferent?'':'checked'} onchange="toggleBilling()"/> Billing address is the same as shipping
          </label>
          <div id="co-billing-fields" style="display:${formData.billingDifferent?'block':'none'};margin-top:14px;">
            <div class="field">
              <label>Billing Address Line 1 *</label>
              <input type="text" id="co-bill-line1" value="${escHtml(formData.billing_line1||'')}" placeholder="Building, street, area"/>
            </div>
            <div class="field">
              <label>Billing Address Line 2</label>
              <input type="text" id="co-bill-line2" value="${escHtml(formData.billing_line2||'')}" placeholder="Apartment, floor, unit (optional)"/>
            </div>
            <div class="field-row">
              <div class="field">
                <label>State / Region *</label>
                <input type="text" id="co-bill-state" value="${escHtml(formData.billing_state||'')}" placeholder="State / Emirate"/>
              </div>
              <div class="field">
                <label>City *</label>
                <input type="text" id="co-bill-city" value="${escHtml(formData.billing_city||'')}" placeholder="City"/>
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label>Postal Code</label>
                <input type="text" id="co-bill-postal" value="${escHtml(formData.billing_postal||'')}" placeholder="Optional"/>
              </div>
              <div class="field">
                <label>Country *</label>
                <input type="text" id="co-bill-country" value="${escHtml(formData.billing_country||'United Arab Emirates')}" placeholder="Country"/>
              </div>
            </div>
          </div>
        </div>
        <div style="margin-top:16px;">
          <button class="btn-primary full" onclick="continueToPayment()">
            Continue to Payment
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      ${summaryHTML()}
    </div>`;
}

// ── STEP 2: Review + Pay ──────────────────────────────────────
function renderStep2() {
  currentStep = 2;
  document.getElementById('co-steps-root').innerHTML = stepsHTML(2);
  const addr = [formData.line1, formData.line2, formData.city||formData.state, formData.state, formData.postal, formData.country].filter(Boolean).join(', ');
  const billAddr = formData.billingDifferent
    ? [formData.billing_line1, formData.billing_line2, formData.billing_city, formData.billing_state, formData.billing_postal, formData.billing_country].filter(Boolean).join(', ')
    : 'Same as shipping';
  const total = Cart.total();
  document.getElementById('co-body').innerHTML = `
    <div class="co-layout">
      <div>
        <button class="co-back-link" onclick="renderStep1()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Edit delivery details
        </button>
        <div class="co-card">
          <div class="co-section-title">Delivery Details</div>
          <div class="co-review-row"><span class="co-review-label">Name</span><span class="co-review-val">${escHtml(formData.name)}</span></div>
          <div class="co-review-row"><span class="co-review-label">Email</span><span class="co-review-val">${escHtml(formData.email)}</span></div>
          <div class="co-review-row"><span class="co-review-label">Phone</span><span class="co-review-val">${escHtml(formData.phone)}</span></div>
          <div class="co-review-row"><span class="co-review-label">Ship To</span><span class="co-review-val">${escHtml(addr)}</span></div>
          <div class="co-review-row"><span class="co-review-label">Bill To</span><span class="co-review-val">${escHtml(billAddr)}</span></div>
        </div>

        <div class="co-card" style="margin-top:14px;">
          <div class="co-error" id="co-pay-error"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <div>
              <div class="co-section-title" style="margin-bottom:4px;">Order Total</div>
              <div style="font-family:'Inter',sans-serif;font-weight:800;font-size:36px;">AED ${total}</div>
            </div>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          </div>
          <button class="btn-primary full" id="co-pay-btn" onclick="submitPayment()" style="font-size:15px;padding:16px;">
            Pay AED ${total} with Card
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          </button>
          <p style="font-family:'Space Mono',monospace;font-size:9px;color:#444;text-align:center;margin-top:12px;letter-spacing:0.05em;line-height:1.6;">Secure payment via Stripe · All major cards accepted<br>You will be redirected to Stripe's secure payment page</p>
        </div>
      </div>
      ${summaryHTML()}
    </div>`;
}

// ── Validation & Navigation ───────────────────────────────────
function toggleBilling() {
  const same = document.getElementById('co-bill-same').checked;
  document.getElementById('co-billing-fields').style.display = same ? 'none' : 'block';
}

function continueToPayment() {
  const errEl = document.getElementById('co-error');
  errEl.style.display = 'none';

  const name = document.getElementById('co-name').value.trim();
  const phone = document.getElementById('co-phone').value.trim();
  const email = document.getElementById('co-email').value.trim();
  const line1 = document.getElementById('co-line1').value.trim();
  const line2 = document.getElementById('co-line2').value.trim();
  const state = document.getElementById('co-state').value;
  const city = document.getElementById('co-city').value.trim();
  const postal = document.getElementById('co-postal').value.trim();
  // Country is locked to UAE — never read from a disabled input
  const country = 'United Arab Emirates';
  const saveAddress = document.getElementById('co-save').checked;

  // Billing address fields
  const billSame = document.getElementById('co-bill-same').checked;
  const billingDifferent = !billSame;
  const billing_line1   = billingDifferent ? document.getElementById('co-bill-line1').value.trim()   : '';
  const billing_line2   = billingDifferent ? document.getElementById('co-bill-line2').value.trim()   : '';
  const billing_city    = billingDifferent ? document.getElementById('co-bill-city').value.trim()    : '';
  const billing_state   = billingDifferent ? document.getElementById('co-bill-state').value.trim()   : '';
  const billing_postal  = billingDifferent ? document.getElementById('co-bill-postal').value.trim()  : '';
  const billing_country = billingDifferent ? document.getElementById('co-bill-country').value.trim() : '';

  if (!name) return showErr('co-error', 'Full name is required.');
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showErr('co-error', 'A valid email address is required.');
  if (!phone) return showErr('co-error', 'Phone number is required for delivery coordination.');
  if (!line1) return showErr('co-error', 'Address line 1 is required.');
  if (!state) return showErr('co-error', 'Please select your emirate.');

  if (billingDifferent) {
    if (!billing_line1) return showErr('co-error', 'Billing address line 1 is required.');
    if (!billing_city)  return showErr('co-error', 'Billing city is required.');
    if (!billing_state) return showErr('co-error', 'Billing state/region is required.');
    if (!billing_country) return showErr('co-error', 'Billing country is required.');
  }

  formData = {
    name, phone, email, line1, line2, state, city, postal, country, saveAddress,
    billingDifferent,
    billing_line1, billing_line2, billing_city, billing_state, billing_postal, billing_country,
  };
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderStep2();
}

async function submitPayment() {
  const btn = document.getElementById('co-pay-btn');
  btn.textContent = 'Redirecting to Stripe…';
  btn.disabled = true;

  try {
    const res = await fetch('/pre-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items: cartItems,
        customer: {
          name: formData.name, email: formData.email, phone: formData.phone,
          line1: formData.line1, line2: formData.line2 || null,
          city: formData.city || formData.state,
          state: formData.state,
          postal: formData.postal || null,
          country: formData.country,
          customerId: customer?.customerId || null,
          saveAddress: formData.saveAddress,
          // Billing address — only sent when user opted out of "same as shipping"
          billing_different: !!formData.billingDifferent,
          billing_line1:   formData.billing_line1   || null,
          billing_line2:   formData.billing_line2   || null,
          billing_city:    formData.billing_city    || null,
          billing_state:   formData.billing_state   || null,
          billing_postal:  formData.billing_postal  || null,
          billing_country: formData.billing_country || null,
        }
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Checkout failed');
    if (data.url) { window.location.href = data.url; return; }
    throw new Error('No payment URL returned');
  } catch(err) {
    showErr('co-pay-error', err.message);
    btn.innerHTML = `Pay AED ${Cart.total()} with Card <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>`;
    btn.disabled = false;
  }
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg; el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── Pre-fill from profile ─────────────────────────────────────
async function prefillProfile() {
  try {
    const res = await fetch('/customer/me', {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('customer_token') }
    });
    if (!res.ok) return;
    const d = await res.json();
    formData = {
      name: d.name || '',
      email: d.email || '',
      phone: d.phone || '',
      line1: d.address_line1 || '',
      line2: d.address_line2 || '',
      city: d.address_city || '',
      state: d.address_state || '',
      postal: d.address_postal || '',
      country: d.address_country || 'United Arab Emirates',
      saveAddress: true,
    };
  } catch(e) { /* non-critical */ }
}

// ── Bootstrap ─────────────────────────────────────────────────
if (!customer) {
  renderAuthGate();
} else {
  prefillProfile().then(() => renderStep1());
}
</script>
