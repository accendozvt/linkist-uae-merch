<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Linkist UAE</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/images/fav.png">
<link rel="stylesheet" href="style.css">
<style>
.auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:80px 24px; }
.auth-card { background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:40px; width:100%; max-width:420px; }
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-logo-text { font-size:22px; font-weight:900; letter-spacing:3px; color:var(--white); }
.auth-logo-sub { font-family:'Space Mono',monospace; font-size:10px; color:#444; letter-spacing:3px; text-transform:uppercase; margin-top:4px; }
.auth-title { font-family:'Inter',sans-serif; font-weight:800; font-size:24px; margin:0 0 8px; }
.auth-sub { font-size:13px; color:#666; line-height:1.6; margin:0 0 24px; }
.field { margin-bottom:18px; }
.field label { display:block; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; color:#555; text-transform:uppercase; margin-bottom:7px; }
.field input { width:100%; background:#0a0a0a; border:1px solid #2a2a2a; border-radius:8px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:14px; padding:12px 14px; outline:none; transition:border-color 0.2s; }
.field input:focus { border-color:#555; }
.auth-error { background:rgba(229,57,53,0.1); border:1px solid rgba(229,57,53,0.3); border-radius:8px; color:#E53935; font-size:13px; padding:12px 14px; margin-bottom:16px; display:none; }
.auth-success { background:rgba(0,122,61,0.1); border:1px solid rgba(0,122,61,0.3); border-radius:8px; color:#00c96a; font-size:13px; padding:12px 14px; margin-bottom:16px; display:none; }
.back-link { display:block; text-align:center; margin-top:16px; font-family:'Space Mono',monospace; font-size:10px; color:#555; text-decoration:none; }
.back-link:hover { color:#888; }
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-text">LINKIST</div>
      <div class="auth-logo-sub">I Never Left · UAE</div>
    </div>
    <h2 class="auth-title">Forgot Password</h2>
    <p class="auth-sub">Enter your email and we'll send you a link to reset your password. The link expires in 1 hour.</p>
    <div class="auth-error" id="fp-error"></div>
    <div class="auth-success" id="fp-success"></div>
    <div id="fp-form">
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="fp-email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <button class="btn-primary" style="width:100%;" id="fp-btn" onclick="doForgotPassword()">Send Reset Link</button>
    </div>
    <a href="account-login.html" class="back-link">← Back to Login</a>
  </div>
</div>

<script src="cart.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav();

document.getElementById('fp-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') doForgotPassword();
});

async function doForgotPassword() {
  const email = document.getElementById('fp-email').value.trim();
  const errEl = document.getElementById('fp-error');
  const sucEl = document.getElementById('fp-success');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('fp-btn');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    // Always show success (don't leak if email exists)
    document.getElementById('fp-form').style.display = 'none';
    sucEl.textContent = 'If an account exists for that email, a reset link is on its way. Check your inbox (and spam folder).';
    sucEl.style.display = 'block';
  } catch {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
  }
}
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
