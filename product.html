<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Never Left T-Shirt — Linkist UAE | Limited Edition</title>
<meta name="description" content="Shop the I Never Left T-Shirt by Linkist UAE. Limited edition April 2026 drop in UAE flag colors. Premium fabric, unisex fit. 100% proceeds to UAE relief.">
<meta property="og:title" content="I Never Left T-Shirt — Linkist UAE"/>
<meta property="og:description" content="Limited edition UAE T-Shirt. April 2026 drop. 100% proceeds to UAE relief."/>
<meta property="og:image" content="/images/og.png"/>
<meta property="og:type" content="product"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="icon" type="image/png" href="/images/fav.png">
<link rel="stylesheet" href="style.css">
<style>
.product-wrap {
  max-width:1060px; margin:0 auto; padding:100px 48px 80px;
  display:grid; grid-template-columns:420px 1fr; gap:56px; align-items:start;
}
.product-img-main {
  position:sticky; top:88px;
  background:#111; border:1px solid #1e1e1e; border-radius:12px; overflow:hidden;
  aspect-ratio:1/1; max-height:420px;
}
.product-img-main img { width:100%; height:100%; object-fit:contain; display:block; padding:12px; }
.product-info { display:flex; flex-direction:column; gap:24px; }
.product-tag { font-family:'Space Mono',monospace; font-size:10px; color:#888; letter-spacing:0.12em; text-transform:uppercase; }
.product-name { font-family:'Inter',sans-serif; font-size:clamp(26px,3.2vw,46px); line-height:1.05; }
.product-tagline { font-size:15px; font-weight:300; color:rgba(255,255,255,0.75); line-height:1.6; }
.product-price { font-family:'Inter',sans-serif; font-size:30px; font-weight:700; line-height:1; letter-spacing:-0.01em; }
.product-price span { font-family:'DM Sans',sans-serif; font-size:16px; font-weight:400; color:#888; }
.product-divider { border:none; border-top:1px solid #1a1a1a; }
.label { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.15em; color:#bbb; text-transform:uppercase; margin-bottom:10px; display:block; }
.sz { color:#ccc !important; border-color:#2a2a2a !important; }
.product-desc { font-size:14px; font-weight:300; line-height:1.8; color:rgba(255,255,255,0.82); }
.product-desc strong { color:#F5F5F5; font-weight:500; }
.details-list { list-style:none; display:grid; grid-template-columns:1fr 1fr; gap:6px 20px; }
.details-list li { font-size:13px; font-weight:300; color:rgba(255,255,255,0.82); display:flex; align-items:center; gap:8px; }
.details-list li::before { content:''; width:4px; height:4px; border-radius:50%; background:#E53935; flex-shrink:0; }
.action-row { display:flex; gap:10px; align-items:center; }
.size-error { font-family:'Space Mono',monospace; font-size:10px; color:#E53935; display:none; margin-top:6px; }
.other-products { padding:0 64px 80px; max-width:1100px; margin:0 auto; }
.other-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:28px; }
.loading-wrap { min-height:60vh; display:flex; align-items:center; justify-content:center; color:#888; font-family:'Space Mono',monospace; font-size:13px; }
.thumb-strip {
  display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
}
.thumb {
  width: 60px; height: 60px; border-radius: 6px; overflow: hidden;
  border: 2px solid transparent; cursor: pointer; flex-shrink: 0;
  background: #0d0d0d;
}
.thumb.active { border-color: var(--accent); }
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.other-grid a { color: var(--white); text-decoration: none; }
.other-grid a * { color: inherit; }
.pcard-tag { color: #888 !important; }
.product-price-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.product-price-original { font-family:'DM Sans',sans-serif; font-size:18px; font-weight:400; color:#555; text-decoration:line-through; }
.product-price-sale { color:#E53935 !important; }
.size-stock-hint { font-family:'Space Mono',monospace; font-size:10px; color:#E53935; margin-top:8px; display:none; }
.notify-size-link { font-family:'Space Mono',monospace; font-size:10px; color:#666; text-decoration:none; cursor:pointer; display:none; margin-top:8px; }
.notify-size-link:hover { color:#fff; }
.notify-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:500; display:none; align-items:center; justify-content:center; padding:20px; }
.notify-modal-overlay.open { display:flex; }
.notify-modal { background:#111; border:1px solid #2a2a2a; border-radius:14px; padding:32px; max-width:380px; width:100%; text-align:center; position:relative; }
.notify-modal h3 { font-family:'Inter',sans-serif; font-size:28px; margin:0 0 8px; }
.notify-modal p { font-size:13px; color:#888; margin:0 0 20px; line-height:1.6; }
.notify-modal input { width:100%; background:#0a0a0a; border:1px solid #2a2a2a; border-radius:8px; color:#F5F5F5; font-size:14px; padding:12px 14px; outline:none; margin-bottom:12px; font-family:'DM Sans',sans-serif; box-sizing:border-box; }
.notify-modal-close { position:absolute; top:12px; right:16px; background:none; border:none; color:#555; font-size:22px; cursor:pointer; }
@media(max-width:768px) {
  .product-wrap{grid-template-columns:1fr;gap:32px;padding:80px 20px 48px}
  .product-img-main{position:relative;top:0}
  .other-products{padding:0 20px 60px}
  .other-grid{
    display:flex; overflow-x:auto; gap:12px;
    scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
    padding-bottom:8px; grid-template-columns:none;
  }
  .other-grid a { flex:0 0 160px; scroll-snap-align:start; }
}
@media(max-width:480px) { .other-grid a { flex:0 0 150px; } }
</style>
</head>
<body>

<div id="nav-root"></div>
<div id="page-content"><div class="loading-wrap">Loading...</div></div>
<div id="footer-root"></div>

<div class="notify-modal-overlay" id="notify-modal">
  <div class="notify-modal">
    <button class="notify-modal-close" onclick="closeNotifyModal()">×</button>
    <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;margin-bottom:2px;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Notify Me</h3>
    <p id="notify-modal-desc">Enter your email and we'll notify you when it's back.</p>
    <input type="email" id="notify-email" placeholder="your@email.com" autocomplete="email"/>
    <button class="btn-primary" style="width:100%;" onclick="submitNotify()">Notify Me</button>
    <div id="notify-feedback" style="font-size:12px;margin-top:10px;display:none;"></div>
  </div>
</div>

<script src="cart.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav();
document.getElementById('footer-root').innerHTML = renderFooter();

const params = new URLSearchParams(window.location.search);
const PRODUCT_ID = params.get('id');

if (!PRODUCT_ID) {
  document.getElementById('page-content').innerHTML = '<div class="loading-wrap">Product not found. <a href="index.html" style="color:#E53935;margin-left:8px;">← Back</a></div>';
} else {
  loadProduct();
}

async function loadProduct() {
  try {
    const res = await fetch('/products');
    const products = await res.json();
    const product = products.find(p => p.id === PRODUCT_ID);
    if (!product) {
      document.getElementById('page-content').innerHTML = '<div class="loading-wrap">Product not found. <a href="index.html" style="color:#E53935;margin-left:8px;">← Back to Collection</a></div>';
      return;
    }
    renderPage(product, products);
  } catch (e) {
    document.getElementById('page-content').innerHTML = '<div class="loading-wrap">Failed to load product. <a href="index.html" style="color:#E53935;margin-left:8px;">← Back</a></div>';
  }
}

function renderPage(product, allProducts) {
  document.title = product.name + ' — I Never Left · Linkist';
  const image = product.image_url || product.image || '';
  const details = Array.isArray(product.details) ? product.details : (product.details ? JSON.parse(product.details) : []);

  document.getElementById('page-content').innerHTML = `
    <div class="product-wrap">
      <div>
        <div class="product-img-main" id="main-img-wrap">
          <img id="prod-img" src="${image}" alt="${product.name}"/>
        </div>
        <div class="thumb-strip" id="thumb-strip" style="display:none"></div>
      </div>
      <div class="product-info">
        <div>
          <div class="product-tag">${product.tag || ''}</div>
          <h1 class="product-name">${product.name}</h1>
          <p class="product-tagline">${product.tagline || ''}</p>
        </div>
        <div class="product-price-row">
          ${(product.compare_at_price || product.original_price) && parseFloat(product.compare_at_price || product.original_price) > parseFloat(product.price)
            ? `<span class="product-price product-price-sale">AED ${parseFloat(product.price).toFixed(2)}</span>
               <span class="product-price-original">AED ${parseFloat(product.compare_at_price || product.original_price).toFixed(2)}</span>`
            : `<span class="product-price">AED ${parseFloat(product.price).toFixed(2)}</span>`
          }
        </div>
        <hr class="product-divider">
        <div>
          <span class="label">Select Size</span>
          <div class="size-grid" id="size-grid"></div>
          <div class="size-error" id="size-error">Please select a size</div>
          <div class="size-stock-hint" id="size-stock-hint"></div>
          <a class="notify-size-link" id="notify-size-link" onclick="openNotifyModal('${product.id}','${(product.name||'').replace(/'/g,"\\'")}', window._selectedSize || '')">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            Notify me when back in stock
          </a>
        </div>
        <div>
          <span class="label">Quantity</span>
          <div class="qty-wrap">
            <button class="qty-btn" id="qty-minus">−</button>
            <span class="qty-num" id="qty-num">1</span>
            <button class="qty-btn" id="qty-plus">+</button>
          </div>
        </div>
        <div class="action-row">
          <button class="btn-primary full" id="atc-btn">Add to Cart</button>
        </div>
        <hr class="product-divider">
        <div>
          <span class="label">About This Design</span>
          <p class="product-desc">${product.description || ''}</p>
        </div>
        ${details.length ? `<div>
          <span class="label">Details</span>
          <ul class="details-list">${details.map(d => '<li>' + d + '</li>').join('')}</ul>
        </div>` : ''}
      </div>
    </div>
    <div class="other-products">
      <div class="section-hdr">
        <h2 class="section-title" style="font-family:'Inter',sans-serif;font-size:clamp(18px,2.2vw,28px);line-height:1;">More From The Collection</h2>
      </div>
      <div class="other-grid" id="other-grid"></div>
    </div>`;

  // Thumbnail gallery
  const images = [image, ...(Array.isArray(product.images) ? product.images : [])].filter(Boolean);
  if (images.length > 1) {
    const strip = document.getElementById('thumb-strip');
    strip.style.display = 'flex';
    strip.innerHTML = images.map((src, i) => `
      <div class="thumb ${i === 0 ? 'active' : ''}" onclick="switchImage('${src}', this)">
        <img src="${src}" alt=""/>
      </div>`).join('');
  }

  window.switchImage = function(src, el) {
    document.getElementById('prod-img').src = src;
    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  };

  // Size buttons
  let selectedSize = null;
  window._selectedSize = null;
  const sizeGrid = document.getElementById('size-grid');
  const stockData = product.stock || {};
  const hasStockData = Object.keys(stockData).length > 0;
  const stockHintEl = document.getElementById('size-stock-hint');
  const notifySizeLink = document.getElementById('notify-size-link');

  SIZES.forEach(s => {
    const qty = hasStockData ? (Number.isFinite(+stockData[s]) ? +stockData[s] : 0) : 999;
    const btn = document.createElement('button');
    btn.className = 'sz';
    btn.dataset.size = s;
    btn.textContent = s;
    const isSoldOut = qty === 0;
    const isLowStock = !isSoldOut && qty > 0 && qty < 5;
    if (isSoldOut) {
      btn.classList.add('sold-out');
      // Keep clickable so user can trigger notify
    }
    btn.addEventListener('click', () => {
      sizeGrid.querySelectorAll('.sz').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (isSoldOut) {
        selectedSize = null;
        window._selectedSize = s;
        stockHintEl.textContent = 'This size is sold out';
        stockHintEl.style.display = 'block';
        notifySizeLink.style.display = 'block';
        document.getElementById('atc-btn').disabled = true;
        document.getElementById('atc-btn').style.opacity = '0.4';
      } else {
        selectedSize = s;
        window._selectedSize = s;
        document.getElementById('atc-btn').disabled = false;
        document.getElementById('atc-btn').style.opacity = '';
        document.getElementById('size-error').style.display = 'none';
        notifySizeLink.style.display = 'none';
        if (isLowStock) {
          stockHintEl.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="#E53935" style="vertical-align:middle;margin-right:4px;flex-shrink:0;"><path d="M13 2L4.09 13H11L10 22l9.91-11H14L13 2z"/></svg>Only ${qty} left in size ${s}`;
          stockHintEl.style.display = 'block';
        } else {
          stockHintEl.style.display = 'none';
        }
      }
    });
    sizeGrid.appendChild(btn);
  });

  // Qty
  let qty = 1;
  document.getElementById('qty-minus').addEventListener('click', () => {
    qty = Math.max(1, qty - 1);
    document.getElementById('qty-num').textContent = qty;
  });
  document.getElementById('qty-plus').addEventListener('click', () => {
    qty = Math.min(10, qty + 1);
    document.getElementById('qty-num').textContent = qty;
  });

  // Add to Cart
  document.getElementById('atc-btn').addEventListener('click', () => {
    if (!selectedSize) {
      document.getElementById('size-error').style.display = 'block';
      sizeGrid.style.outline = '1px solid #E53935';
      sizeGrid.style.borderRadius = '8px';
      sizeGrid.style.padding = '8px';
      setTimeout(() => { sizeGrid.style.outline = ''; sizeGrid.style.padding = ''; }, 1500);
      return;
    }
    const itemKey = `${product.id}-${selectedSize}`;
    Cart.add(
      { id: product.id, name: product.name, price: product.price, image },
      selectedSize, qty
    );
    const btn = document.getElementById('atc-btn');
    btn.textContent = '✓ Added!';
    btn.style.background = '#1a4a1a';
    btn.style.color = '#4CAF50';
    setTimeout(() => { btn.textContent = 'Add to Cart'; btn.style.background = ''; btn.style.color = ''; }, 2000);
    openMiniCart(itemKey);
  });

  // Notify modal click-outside
  document.getElementById('notify-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('notify-modal')) closeNotifyModal();
  });

  // Other products
  const others = allProducts.filter(p => p.id !== PRODUCT_ID).slice(0, 3);
  document.getElementById('other-grid').innerHTML = others.map(p => {
    const img = p.image_url || p.image || '';
    const pg = p.page || `product.html?id=${p.id}`;
    return `<a href="${pg}" class="pcard">
      <div class="pcard-img" style="background:#0d0d0d;aspect-ratio:1/1;overflow:hidden;position:relative;">
        <img src="${img}" alt="${p.name}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;"/>
        ${p.badge ? '<div class="pcard-badge">' + p.badge + '</div>' : ''}
      </div>
      <div class="pcard-info" style="padding:14px;display:flex;flex-direction:column;gap:8px;background:#111;">
        <div class="pcard-name">${p.name}</div>
        <div class="pcard-tag">${p.tag || ''}</div>
        <div class="pcard-price" style="color:#F5F5F5;font-family:'Inter',sans-serif;font-weight:700;font-size:16px;">AED ${parseFloat(p.price).toFixed(2)}</div>
      </div>
    </a>`;
  }).join('');
}
</script>
<script>
let _notifyPid = '', _notifySize = '';
function openNotifyModal(pid, pname, size) {
  _notifyPid = pid; _notifySize = size;
  document.getElementById('notify-modal-desc').innerHTML = size
    ? `We'll email you when <strong>${pname}</strong> in size <strong>${size}</strong> is back.`
    : `We'll email you when <strong>${pname}</strong> is back in stock.`;
  document.getElementById('notify-email').value = '';
  document.getElementById('notify-feedback').style.display = 'none';
  document.getElementById('notify-modal').classList.add('open');
}
function closeNotifyModal() { document.getElementById('notify-modal').classList.remove('open'); }
async function submitNotify() {
  const email = document.getElementById('notify-email').value.trim();
  if (!email) return;
  const fb = document.getElementById('notify-feedback');
  try {
    const res = await fetch('/notify-me', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, product_id: _notifyPid, size: _notifySize }) });
    const data = await res.json();
    if (res.ok) { fb.textContent = "You're on the list!"; fb.style.color = '#007A3D'; fb.style.display = 'block'; setTimeout(closeNotifyModal, 2000); }
    else { fb.textContent = data.error || 'Error'; fb.style.color = '#E53935'; fb.style.display = 'block'; }
  } catch { fb.textContent = 'Could not connect.'; fb.style.color = '#E53935'; fb.style.display = 'block'; }
}
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
