<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Linkist UAE</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/images/fav.png">
<link rel="stylesheet" href="style.css">
<style>
.auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:80px 24px; }
.auth-card { background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:40px; width:100%; max-width:420px; }
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-logo-text { font-size:22px; font-weight:900; letter-spacing:3px; color:var(--white); }
.auth-logo-sub { font-family:'Space Mono',monospace; font-size:10px; color:#444; letter-spacing:3px; text-transform:uppercase; margin-top:4px; }
.auth-title { font-family:'Inter',sans-serif; font-weight:800; font-size:24px; margin:0 0 8px; }
.auth-sub { font-size:13px; color:#666; line-height:1.6; margin:0 0 24px; }
.field { margin-bottom:18px; }
.field label { display:block; font-family:'Space Mono',monospace; font-size:9px; letter-spacing:2px; color:#555; text-transform:uppercase; margin-bottom:7px; }
.field input { width:100%; background:#0a0a0a; border:1px solid #2a2a2a; border-radius:8px; color:var(--white); font-family:'DM Sans',sans-serif; font-size:14px; padding:12px 14px; outline:none; transition:border-color 0.2s; }
.field input:focus { border-color:#555; }
.field input.error { border-color:#E53935; }
.auth-error { background:rgba(229,57,53,0.1); border:1px solid rgba(229,57,53,0.3); border-radius:8px; color:#E53935; font-size:13px; padding:12px 14px; margin-bottom:16px; display:none; }
.auth-success { background:rgba(0,122,61,0.1); border:1px solid rgba(0,122,61,0.3); border-radius:8px; color:#00c96a; font-size:13px; padding:12px 14px; margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div id="nav-root"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-text">LINKIST</div>
      <div class="auth-logo-sub">I Never Left · UAE</div>
    </div>

    <div id="rp-invalid" style="display:none; text-align:center; padding:20px 0;">
      <div style="font-size:48px;margin-bottom:16px;">⛔</div>
      <h2 style="font-family:'Inter',sans-serif;font-weight:800;font-size:22px;margin-bottom:10px;">Invalid Link</h2>
      <p style="font-size:13px;color:#666;margin-bottom:20px;">This reset link is invalid or has expired. Links are valid for 1 hour.</p>
      <a href="forgot-password.html" class="btn-primary" style="text-decoration:none;display:inline-block;padding:12px 28px;">Request New Link</a>
    </div>

    <div id="rp-form">
      <h2 class="auth-title">Reset Password</h2>
      <p class="auth-sub">Choose a new password for your account.</p>
      <div class="auth-error" id="rp-error"></div>
      <div class="auth-success" id="rp-success"></div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="rp-password" placeholder="Min. 8 characters" autocomplete="new-password"/>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="rp-confirm" placeholder="Repeat password" autocomplete="new-password"/>
      </div>
      <button class="btn-primary" style="width:100%;" id="rp-btn" onclick="doReset()">Set New Password</button>
    </div>
  </div>
</div>

<script src="cart.js"></script>
<script>
document.getElementById('nav-root').innerHTML = renderNav();

const params = new URLSearchParams(window.location.search);
const resetToken = params.get('token');

if (!resetToken) {
  document.getElementById('rp-form').style.display = 'none';
  document.getElementById('rp-invalid').style.display = 'block';
}

async function doReset() {
  const pw = document.getElementById('rp-password').value;
  const conf = document.getElementById('rp-confirm').value;
  const errEl = document.getElementById('rp-error');
  const sucEl = document.getElementById('rp-success');
  errEl.style.display = 'none';
  sucEl.style.display = 'none';

  if (pw.length < 8) {
    errEl.textContent = 'Password must be at least 8 characters.';
    errEl.style.display = 'block';
    return;
  }
  if (pw !== conf) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  const btn = document.getElementById('rp-btn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  try {
    const res = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: resetToken, password: pw })
    });
    const data = await res.json();
    if (res.ok) {
      sucEl.textContent = 'Password updated! Redirecting to login…';
      sucEl.style.display = 'block';
      document.getElementById('rp-password').value = '';
      document.getElementById('rp-confirm').value = '';
      setTimeout(() => { window.location.href = 'account-login.html?msg=password_reset'; }, 2000);
    } else {
      errEl.textContent = data.error || 'Something went wrong.';
      errEl.style.display = 'block';
      if (/expired|invalid/i.test(data.error || '')) {
        setTimeout(() => {
          document.getElementById('rp-form').style.display = 'none';
          document.getElementById('rp-invalid').style.display = 'block';
        }, 2000);
      }
      btn.textContent = 'Set New Password';
      btn.disabled = false;
    }
  } catch {
    errEl.textContent = 'Something went wrong. Please try again.';
    errEl.style.display = 'block';
    btn.textContent = 'Set New Password';
    btn.disabled = false;
  }
}
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
